version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - "bsand49"
    groups:
      action-updates:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - "bsand49"
    groups:
      npm-safe-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pub"
    directory: "/mobile"
    schedule:
      interval: "weekly"
    assignees:
      - "bsand49"
    groups:
      pub-safe-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
