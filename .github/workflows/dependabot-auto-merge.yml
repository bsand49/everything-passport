name: Dependabot Auto-Merge
run-name: "Auto-merge check for PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-merge:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' && 
      !github.event.pull_request.draft &&
      (github.event_name != 'pull_request_review' || github.event.review.state == 'approved')

    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ github.token }}"

      - name: Enable auto-merge for Dependabot PRs
        if: |
          contains(steps.metadata.outputs.group, 'npm-safe-updates') ||
          contains(steps.metadata.outputs.group, 'pub-safe-updates') ||
          contains(steps.metadata.outputs.group, 'action-updates')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --auto --squash || echo "Auto-merge flag could not be set yet; will retry on next event."
