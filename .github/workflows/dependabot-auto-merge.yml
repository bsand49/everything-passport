name: Dependabot Auto-Merge
run-name: Auto-merge check for PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for Dependabot PRs
        if: |
          contains(steps.metadata.outputs.group, 'npm-safe-updates') ||
          contains(steps.metadata.outputs.group, 'pub-safe-updates') ||
          contains(steps.metadata.outputs.group, 'action-updates')
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
