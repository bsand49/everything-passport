name: Build and Test
run-name: Build and Test for PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}

on:
  pull_request:
    branches: [ main, master ]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test-mobile:
    name: Build and Test (Mobile)
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      pull-requests: write

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          pub-cache: true

      - name: Configure Firebase
        uses: ./.github/actions/configure-firebase
        with:
          service-account-json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          project-id: ${{ secrets.FIREBASE_PROJECT_ID }}
          android-package-name: 'com.bsand49.everything_passport'
          ios-bundle-id: 'com.bsand49.everythingPassport'
          output-path: 'lib/firebase_options_dev.dart'
          working-directory: 'mobile'

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Install dependencies
        run: flutter pub get

      - name: Run static analysis
        run: flutter analyze

      - name: Run unit tests
        run: flutter test --coverage

      - name: Report code coverage
        uses: ./.github/actions/report-coverage
        with:
          threshold: ${{ vars.MOBILE_COVERAGE_THRESHOLD || 80 }}

      - name: Build debug APK
        run: flutter build apk --debug --no-pub

  smoke-test-mobile:
    name: Smoke Test (Android Emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: dev

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          pub-cache: true

      - name: Configure Firebase
        uses: ./.github/actions/configure-firebase
        with:
          service-account-json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          project-id: ${{ secrets.FIREBASE_PROJECT_ID }}
          android-package-name: 'com.bsand49.everything_passport'
          ios-bundle-id: 'com.bsand49.everythingPassport'
          output-path: 'lib/firebase_options_dev.dart'
          working-directory: 'mobile'

      - name: Install dependencies
        run: flutter pub get

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Integration Tests (Smoke Test)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          working-directory: mobile
          script: flutter test --dart-define=SERVER_CLIENT_ID=${{ secrets.SERVER_CLIENT_ID }} integration_test/app_test.dart
