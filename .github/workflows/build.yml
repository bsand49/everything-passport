name: Build and Test
run-name: Build and Test for PR #${{ github.event.number }} - ${{ github.event.pull_request.title }}

on:
  pull_request:
    branches: [ main, master ]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test-mobile:
    name: Build and Test (Mobile)
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Verify formatting
        run: flutter format --set-exit-if-changed .

      - name: Cache Pub dependencies
        uses: actions/cache@v6
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Run static analysis
        run: flutter analyze

      - name: Run unit tests
        run: flutter test --coverage

      - name: Report code coverage
        env:
          THRESHOLD: ${{ vars.MOBILE_COVERAGE_THRESHOLD || 80 }}
        run: |
          if [ -f coverage/lcov.info ]; then
            TOTAL_LF=$(grep "LF:" coverage/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
            TOTAL_LH=$(grep "LH:" coverage/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
            if [ "$TOTAL_LF" -gt 0 ]; then
              PERCENTAGE=$(awk "BEGIN {printf \"%.2f\", ($TOTAL_LH / $TOTAL_LF) * 100}")
          
              # Build the markdown content file
              echo "### Flutter Coverage Report 📊" > pr_comment.md
              echo "| Metric | Value |" >> pr_comment.md
              echo "| --- | --- |" >> pr_comment.md
              echo "| Lines Found | $TOTAL_LF |" >> pr_comment.md
              echo "| Lines Hit | $TOTAL_LH |" >> pr_comment.md
          
              IS_BELOW=$(awk "BEGIN {print ($PERCENTAGE < $THRESHOLD) ? 1 : 0}")
              if [ "$IS_BELOW" -eq 1 ]; then
                echo "| **Coverage** | **❌ $PERCENTAGE%** (Required: $THRESHOLD%) |" >> pr_comment.md
                # Duplicate to step summary for logging visibility
                cat pr_comment.md >> $GITHUB_STEP_SUMMARY
                echo "::error::Code coverage ($PERCENTAGE%) is below the required threshold of $THRESHOLD%"
                exit 1
              else
                echo "| **Coverage** | **✅ $PERCENTAGE%** (Required: $THRESHOLD%) |" >> pr_comment.md
                cat pr_comment.md >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "No lines found for coverage calculation."
              exit 1
            fi
          else
            echo "Coverage file not found."
            exit 1
          fi

      - name: Build debug APK
        run: flutter build apk --debug --no-pub

      - name: Publish PR Comment
        uses: marocchino/sticky-pull-request-comment@v3
        if: always()
        with:
          header: flutter-coverage-report
          path: mobile/pr_comment.md

  smoke-test-mobile:
    name: Smoke Test (Android Emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: dev

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "::error::GOOGLE_SERVICES_JSON_BASE64 secret is missing. Integration tests will likely fail."
          else
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
          fi

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Integration Tests (Smoke Test)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          working-directory: mobile
          script: flutter test --dart-define=SERVER_CLIENT_ID=${{ secrets.SERVER_CLIENT_ID }} integration_test/app_test.dart
