name: Build and Test
run-name: "Build and Test for PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}"

on:
  pull_request:
    branches: [ main, master ]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test-mobile:
    name: Build and Test (Mobile)
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      pull-requests: write

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          pub-cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Configure Firebase
        uses: ./.github/actions/configure-firebase
        with:
          service-account-json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          project-id: ${{ secrets.FIREBASE_PROJECT_ID }}
          android-package-name: 'com.bsand49.everything_passport'
          ios-bundle-id: 'com.bsand49.everythingPassport'
          output-path: 'lib/firebase_options_dev.dart'
          working-directory: 'mobile'

      - name: Generate mock files
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run static analysis
        run: flutter analyze

      - name: Run unit tests
        run: flutter test --coverage

      - name: Report code coverage
        uses: ./.github/actions/report-coverage
        with:
          threshold: ${{ vars.MOBILE_COVERAGE_THRESHOLD || 90 }}

  smoke-test-mobile:
    name: Smoke Test (Android Emulator)
    needs: build-and-test-mobile
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: dev

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /opt/ghc

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          pub-cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Firebase
        uses: ./.github/actions/configure-firebase
        with:
          service-account-json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          project-id: ${{ secrets.FIREBASE_PROJECT_ID }}
          android-package-name: 'com.bsand49.everything_passport'
          ios-bundle-id: 'com.bsand49.everythingPassport'
          output-path: 'lib/firebase_options_dev.dart'
          working-directory: 'mobile'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache Android SDK Components
        uses: actions/cache@v6
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
            /usr/local/lib/android/sdk/system-images/android-31/google_apis/x86_64/*
          key: avd-api-31-system-image-v1

      - name: Cache Gradle Build Outputs
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            mobile/android/.gradle
            mobile/build
          key: gradle-cache-${{ hashFiles('mobile/android/build.gradle*', 'mobile/android/app/build.gradle*', 'mobile/pubspec.yaml') }}
          restore-keys: |
            gradle-cache-

      - name: Run Integration Tests (Smoke Test)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: mobile
          script: flutter test --dart-define=SERVER_CLIENT_ID=${{ secrets.SERVER_CLIENT_ID }} integration_test/app_test.dart
