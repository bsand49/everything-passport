name: 'Report Code Coverage'
description: 'Parses lcov.info, checks threshold, and posts a PR comment'
inputs:
  lcov-file:
    description: 'Path to the lcov.info file'
    required: true
    default: 'coverage/lcov.info'
  threshold:
    description: 'Coverage percentage threshold'
    required: true
    default: '80'
  header:
    description: 'Unique header for the sticky comment'
    required: true
    default: 'flutter-coverage-report'
  working-directory:
    description: 'Directory where the lcov file is located'
    required: true
    default: 'mobile'

runs:
  using: "composite"
  steps:
    - name: Parse and Report Coverage
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        LCOV_FILE: ${{ inputs.lcov-file }}
        THRESHOLD: ${{ inputs.threshold }}
      run: |
        if [ -f "$LCOV_FILE" ]; then
          TOTAL_LF=$(grep "LF:" "$LCOV_FILE" | cut -d: -f2 | awk '{s+=$1} END {print s}')
          TOTAL_LH=$(grep "LH:" "$LCOV_FILE" | cut -d: -f2 | awk '{s+=$1} END {print s}')
          if [ "$TOTAL_LF" -gt 0 ]; then
            PERCENTAGE=$(awk "BEGIN {printf \"%.2f\", ($TOTAL_LH / $TOTAL_LF) * 100}")
        
            # Build the markdown content file
            echo "### Flutter Coverage Report 📊" > pr_comment.md
            echo "| Metric | Value |" >> pr_comment.md
            echo "| --- | --- |" >> pr_comment.md
            echo "| Lines Found | $TOTAL_LF |" >> pr_comment.md
            echo "| Lines Hit | $TOTAL_LH |" >> pr_comment.md
            
            IS_BELOW=$(awk "BEGIN {print ($PERCENTAGE < $THRESHOLD) ? 1 : 0}")
            if [ "$IS_BELOW" -eq 1 ]; then
              echo "| **Coverage** | **❌ $PERCENTAGE%** (Required: $THRESHOLD%) |" >> pr_comment.md
              cat pr_comment.md >> $GITHUB_STEP_SUMMARY
              echo "::error::Code coverage ($PERCENTAGE%) is below the required threshold of $THRESHOLD%"
              echo "has_report=true" >> $GITHUB_OUTPUT
              exit 1
            else
              echo "| **Coverage** | **✅ $PERCENTAGE%** (Required: $THRESHOLD%) |" >> pr_comment.md
              cat pr_comment.md >> $GITHUB_STEP_SUMMARY
              echo "has_report=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "No lines found for coverage calculation."
            exit 1
          fi
        else
          echo "Coverage file $LCOV_FILE not found."
          exit 1
        fi
      id: coverage_script

    - name: Publish PR Comment
      uses: marocchino/sticky-pull-request-comment@v3
      if: always() && steps.coverage_script.outputs.has_report == 'true'
      with:
        header: ${{ inputs.header }}
        path: ${{ inputs.working-directory }}/pr_comment.md
