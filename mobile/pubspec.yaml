name: everything_passport
description: A cross-platform travel companion app designed to help users gamify and track their life experiences.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  country_flags: ^4.1.2
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  google_sign_in: ^7.2.0
  provider: ^6.1.2
  cloud_firestore: ^6.7.1
  firebase_storage: ^13.4.5
  image_picker: ^1.2.3
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  mime: ^2.0.0
  image_cropper: ^12.2.1
  http: ^1.6.0
  path_provider: ^2.1.6
  path: ^1.9.1
  rxdart: ^0.28.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.7.0
  build_runner: ^2.4.11
  fake_cloud_firestore: ^4.2.0
  firebase_auth_mocks: ^0.15.2
  firebase_storage_mocks: ^0.8.1
  google_sign_in_mocks: ^0.4.1
  firebase_core_platform_interface: ^8.0.0
  http_mock_adapter: ^0.6.1
  path_provider_platform_interface: ^2.1.3
  plugin_platform_interface: ^2.1.8
  image_picker_platform_interface: ^2.1.0
  image_cropper_platform_interface: ^8.0.0

flutter:
  uses-material-design: true
